services:
  postgres:
    image: postgres:16-alpine
    container_name: hunch-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hunch
      POSTGRES_PASSWORD: hunch
      POSTGRES_DB: hunch
    volumes:
      - hunch-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hunch -d hunch"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hunch-postgres-data:
